events {}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;

    upstream order_service {
        server order-service:50051;
    }

    server {
        listen 80 http2;

        location / {
            grpc_pass grpc://order_service;
        }
    }
}
