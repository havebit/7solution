services:
  nginx-lb:
    image: nginx:1.24-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - order-service
    networks:
      - grpc-network

  envoy-lb:
    image: envoyproxy/envoy:v1.27-latest
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "10000:10000"
    networks:
      - grpc-network

  order-service:
    build: .
    environment:
      - SERVICE_TYPE=order
      - PAYMENT_ADDR=envoy-lb:10000 # Point to Envoy LB instead of service directly
      - PORT=50051
    depends_on:
      - envoy-lb
    networks:
      - grpc-network

  payment-service:
    build: .
    environment:
      - SERVICE_TYPE=payment
      - PORT=50051
    deploy:
      replicas: 3
    networks:
      - grpc-network

networks:
  grpc-network:
    driver: bridge
